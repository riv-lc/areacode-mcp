name: Publish to npm

# Publishes @riv-lc/areacode-mcp to the PUBLIC npmjs.com registry on a v*.*.*
# tag, using npm Trusted Publishing (OIDC). No NPM_TOKEN secret — auth happens
# via GitHub's OIDC token, and provenance is added automatically.
#
# One-time setup on npmjs.com (AFTER the first manual `npm publish`, since the
# package must exist first):
#   npmjs.com → the package → Settings → Trusted Publisher → GitHub Actions:
#     Organization or user: riv-lc
#     Repository:           areacode-mcp
#     Workflow filename:    release.yml
#   Save. From then on this workflow publishes with no stored credentials.
#
# Release: `npm version patch && git push --follow-tags`.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write # OIDC: lets npm trust this workflow + attaches provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1
      - run: npm ci
      - run: npm run build
      - run: npm publish # auth via OIDC; provenance automatic under trusted publishing
